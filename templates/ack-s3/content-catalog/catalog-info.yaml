apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: ${{ values.team }}-${{ values.projectName }}-${{ values.environment }}-bucket
  description: "S3 bucket for ${{ values.projectName }} (${{ values.environment }}) — provisioned via Backstage/ACK"
  annotations:
    backstage.io/managed-by-location: "url:https://github.com/patel0ankur/idp-infra-configs/blob/main/teams/${{ values.team }}/infra/s3-bucket.yaml"
    backstage.io/managed-by-origin-location: "url:https://github.com/patel0ankur/idp-infra-configs/blob/main/teams/${{ values.team }}/infra/s3-bucket.yaml"
    # AWS resource details — visible in the About card
    aws/resource-type: "S3 Bucket"
    aws/bucket-name: "${{ values.team }}-${{ values.projectName }}-${{ values.environment }}"
    aws/region: "us-east-1"
    aws/console-url: "https://s3.console.aws.amazon.com/s3/buckets/${{ values.team }}-${{ values.projectName }}-${{ values.environment }}"
  labels:
    team: ${{ values.team }}
    environment: ${{ values.environment }}
    cost-center: ${{ values.costCenter }}
    provisioner: ack
  tags:
    - s3
    - aws
    - ack
    - ${{ values.environment }}
  links:
    - url: "https://s3.console.aws.amazon.com/s3/buckets/${{ values.team }}-${{ values.projectName }}-${{ values.environment }}"
      title: "View in AWS S3 Console"
      icon: dashboard
    - url: "https://github.com/patel0ankur/idp-infra-configs/blob/main/teams/${{ values.team }}/infra/s3-bucket.yaml"
      title: "View ACK Manifest (GitHub)"
      icon: github
spec:
  type: s3-bucket
  owner: group:${{ values.team }}
  lifecycle: production
  system: ${{ values.team }}-infrastructure
  dependencyOf: []
