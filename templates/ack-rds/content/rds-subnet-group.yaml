apiVersion: rds.services.k8s.aws/v1alpha1
kind: DBSubnetGroup
metadata:
  name: ${{ values.team }}-${{ values.projectName }}-${{ values.environment }}-subnet-group
  namespace: ${{ values.team }}
  labels:
    team: ${{ values.team }}
    environment: ${{ values.environment }}
    managed-by: backstage
    provisioner: ack
spec:
  name: ${{ values.team }}-${{ values.projectName }}-${{ values.environment }}-subnet-group
  description: "Subnet group for ${{ values.projectName }} (${{ values.environment }}) — managed by Backstage/ACK"
  # Private subnets from the platform VPC (set by platform team in this template)
  # Developers don't need to know these — the template handles it automatically
  subnetIDs:
    - subnet-0a055dddc54e2415a   # us-east-1b private
    - subnet-0d3ebae65f79ba484   # us-east-1a private
  tags:
    - key: team
      value: ${{ values.team }}
    - key: environment
      value: ${{ values.environment }}
    - key: managed-by
      value: backstage-ack
